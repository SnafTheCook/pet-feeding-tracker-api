services:
  pet-feeding-api:
    image: didwefeedthecattoday-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AppSettings__Token=${JWT_TOKEN}
      - AppSettings__RabbitMqHost=rabbitmq
      - AppSettings__AllowedOrigins__0=http://localhost:5001
      - AppSettings__AllowedOrigins__1=http://localhost:5002
      - ConnectionStrings__DefaultConnection=Server=db;Database=PetsDB;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=true
    depends_on:
      - db
      - rabbitmq  
    networks:
      - cat-network
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "1433:1433"
    networks:
      - cat-network
  rabbitmq:
      image: rabbitmq:3-management
      container_name: cat-bus
      ports:
        - "5672:5672"
        - "15672:15672"
      networks:
        - cat-network
  notification-api:
    profiles: ["full-stack"]
    image: notification-service:latest
    build:
      context: ../notification-service 
      dockerfile: Notification.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AppSettings__RabbitMqHost=rabbitmq
      - ConnectionStrings__DefaultConnection=Data Source=notifications.db
    networks:
      - cat-network
    depends_on:
      - rabbitmq
  pet-feeding-ui:
    image: didwefeedthecattoday-ui:latest
    build:
      context: .
      dockerfile: DidWeFeedTheCatToday.Client/Dockerfile
    ports:
      - "5001:80" #http://localhost:5001
    depends_on:
      - pet-feeding-api
    networks:
      - cat-network
  pet-feeding-mobile-web:
    image: didwefeedthecattoday-mobile-ui:latest
    build:
      context: ./DidWeFeedTheCatToday.Mobile
      dockerfile: Dockerfile
    ports:
      - "5002:80" #http://localhost:5002
    depends_on:
      - pet-feeding-api
    networks:
      - cat-network
networks:
  cat-network:
    driver: bridge